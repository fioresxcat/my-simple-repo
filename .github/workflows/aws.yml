name: Build & Deploy to EC2 (ECR + SSM)

on:
  push:
    branches:
      - master

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: my-simple-repo
  IMAGE_TAG: latest

  # Must match the Terraform tag on the instance:
  # tags = { Name = "${var.project_name}-ec2" }
  EC2_TAG_NAME: my-simple-repo-ec2

  CONTAINER_NAME: my-simple-repo
  APP_PORT: "8000"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set ECR registry env
        run: echo "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        run: |
          set -euxo pipefail
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" -f Dockerfile .
          docker push "${IMAGE_URI}"

      - name: Redeploy on EC2 via SSM
        run: |
          set -euxo pipefail

          DEPLOY_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          export DEPLOY_IMAGE

          commands_json="$(python3 - <<'PY'
          import json, os
          cmds = [
            "set -euxo pipefail",
            f"docker rm -f {os.environ['CONTAINER_NAME']} || true",
            f"aws ecr get-login-password --region {os.environ['AWS_REGION']} | docker login --username AWS --password-stdin {os.environ['ECR_REGISTRY']}",
            f"docker pull {os.environ['DEPLOY_IMAGE']}",
            "docker run -d "
            f"--name {os.environ['CONTAINER_NAME']} "
            "--restart unless-stopped "
            f"-e PORT={os.environ['APP_PORT']} "
            f"-p {os.environ['APP_PORT']}:{os.environ['APP_PORT']} "
            f"{os.environ['DEPLOY_IMAGE']}"
          ]
          print(json.dumps(cmds))
          PY
          )"

          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=${EC2_TAG_NAME}" \
            --parameters "commands=${commands_json}" \
            --timeout-seconds 600 \
            --output json